<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Happy Birthday - Ly Tuan Heart</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Arial', sans-serif;
        }

        /* Nền sao */
        #star-canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        /* Nút bấm */
        #start-btn {
            z-index: 10;
            padding: 15px 40px;
            font-size: 20px;
            background: transparent;
            color: #fff;
            border: 2px solid #fff;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(255,255,255,0.3);
            transition: 0.3s;
        }

        #start-btn:hover { background: #fff; color: #000; }

        /* Bì thư đen */
        #envelope-wrapper {
            display: none;
            z-index: 5;
            transition: all 1s ease;
        }

        .envelope {
            width: 250px;
            height: 150px;
            background: #1a1a1a;
            position: relative;
            border: 1px solid #333;
        }

        .envelope::after {
            content: "";
            position: absolute;
            top: 0;
            border-top: 80px solid #252525;
            border-left: 125px solid transparent;
            border-right: 125px solid transparent;
        }

        .fade-out { opacity: 0; transform: scale(0); }

        /* Trái tim Lý Tuân */
        #heart-canvas {
            display: none;
            position: absolute;
            z-index: 2;
        }

        .thai-text {
            position: absolute;
            z-index: 3;
            color: #ff4d6d;
            font-size: 35px;
            font-weight: bold;
            display: none;
            text-shadow: 0 0 15px #ff4d6d;
            pointer-events: none;
        }

        .bee {
            position: absolute;
            font-size: 25px;
            z-index: 4;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <canvas id="star-canvas"></canvas>
    <button id="start-btn">คลิกที่นี่</button>

    <div id="envelope-wrapper">
        <div class="envelope"></div>
    </div>

    <canvas id="heart-canvas"></canvas>
    <div id="thai-msg" class="thai-text">สุขสันต์วันเกิด</div>

    <script>
        const btn = document.getElementById('start-btn');
        const env = document.getElementById('envelope-wrapper');
        const heartCanvas = document.getElementById('heart-canvas');
        const msg = document.getElementById('thai-msg');

        // Khởi tạo nền sao
        const starCtx = document.getElementById('star-canvas').getContext('2d');
        let stars = [];
        function initStars() {
            starCtx.canvas.width = window.innerWidth;
            starCtx.canvas.height = window.innerHeight;
            for(let i=0; i<200; i++) {
                stars.push({x: Math.random()*innerWidth, y: Math.random()*innerHeight, r: Math.random()*1.5, d: Math.random()*2});
            }
        }
        function drawStars() {
            starCtx.clearRect(0,0,innerWidth,innerHeight);
            starCtx.fillStyle = "white";
            stars.forEach(s => {
                starCtx.beginPath();
                starCtx.arc(s.x, s.y, s.r, 0, Math.PI*2);
                starCtx.fill();
            });
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();

        // Xử lý bấm nút
        btn.onclick = () => {
            btn.style.display = 'none';
            env.style.display = 'block';
            setTimeout(() => {
                env.classList.add('fade-out');
                setTimeout(() => {
                    env.style.display = 'none';
                    showHeart();
                }, 1000);
            }, 1000);
        };

        // Code Trái tim Lý Tuân (Simplified Version)
        function showHeart() {
            heartCanvas.style.display = 'block';
            msg.style.display = 'block';
            const ctx = heartCanvas.getContext('2d');
            heartCanvas.width = window.innerWidth;
            heartCanvas.height = window.innerHeight;

            const heartPoints = [];
            const particles = [];

            function getHeartPoint(t) {
                let x = 16 * Math.pow(Math.sin(t), 3);
                let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
                return { x: x * 15, y: -y * 15 };
            }

            for (let i = 0; i < 500; i++) {
                heartPoints.push(getHeartPoint(Math.PI * 2 * i / 500));
            }

            function createParticle() {
                const point = heartPoints[Math.floor(Math.random() * heartPoints.length)];
                return {
                    x: heartCanvas.width / 2 + point.x,
                    y: heartCanvas.height / 2 + point.y,
                    vx: (Math.random() - 0.5) * 2,
                    vy: (Math.random() - 0.5) * 2,
                    life: Math.random() * 30 + 20
                };
            }

            function draw() {
                ctx.clearRect(0, 0, heartCanvas.width, heartCanvas.height);
                ctx.fillStyle = "#ff4d6d";
                if (particles.length < 2000) {
                    for(let i=0; i<20; i++) particles.push(createParticle());
                }
