<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>I LOVE U - Heart & Bees</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; }
        .content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; pointer-events: none;
        }
        .love-text { 
            color: #ff4d6d; 
            font-size: 4rem; 
            font-weight: bold; 
            text-shadow: 0 0 20px #ff0000, 0 0 40px #ff3366;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }
        .bee { position: absolute; font-size: 25px; z-index: 5; }
        .flower { position: absolute; font-size: 22px; z-index: 4; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="content">
        <div class="love-text">I LOVE U💞</div>
    </div>
    <canvas id="heartCanvas"></canvas>

            };
        }
