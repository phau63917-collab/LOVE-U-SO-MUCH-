<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chúc Mừng Sinh Nhật</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #ffeef0;
            margin: 0;
            overflow: hidden;
            font-family: 'Arial', sans-serif;
        }

        /* Nút Bấm Ban Đầu */
        #start-btn {
            padding: 15px 30px;
            font-size: 20px;
            background-color: #ff4d6d;
            color: white;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
            z-index: 10;
        }

        /* Bì thư */
        .envelope-wrapper {
            display: none;
            position: relative;
            cursor: pointer;
            transition: transform 0.5s;
        }

        .envelope {
            position: relative;
            width: 300px;
            height: 200px;
            background: #f08080;
            border-bottom-left-radius: 10px;
            border-bottom-right-radius: 10px;
        }

        .envelope::before {
            content: "";
            position: absolute;
            top: 0;
            z-index: 2;
            border-top: 130px solid #f08080;
            border-left: 150px solid transparent;
            border-right: 150px solid transparent;
            transform-origin: top;
            transition: transform 0.5s 0.3s;
        }

        /* Khi mở thư */
        .envelope.open::before {
            transform: rotateX(180deg);
            z-index: 0;
        }

        /* Nội dung bên trong (Bánh và Ảnh) */
        .letter-content {
            position: absolute;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 0;
            background: white;
            transition: height 0.5s 0.6s, bottom 0.5s 0.6s;
            overflow: hidden;
            border-radius: 10px;
            text-align: center;
            padding: 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.1);
        }

        .envelope.open .letter-content {
            height: 450px;
            bottom: 100px;
            padding: 20px;
            overflow-y: auto;
        }

        .letter-content img {
            max-width: 100%;
            border-radius: 10px;
            margin-bottom: 15px;
        }

        /* Con ong bay */
        .bee {
            position: absolute;
            font-size: 30px;
            pointer-events: none;
            z-index: 5;
            animation: fly 5s linear infinite;
        }

        @keyframes fly {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, -50px) rotate(20deg); }
            50% { transform: translate(200px, 50px) rotate(-20deg); }
            75% { transform: translate(-100px, 100px) rotate(10deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        /* Trái tim rơi */
        .heart {
            position: absolute;
            color: #ff4d6d;
            font-size: 20px;
            pointer-events: none;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh); opacity: 0; }
        }
    </style>
</head>
<body>

    <button id="start-btn" onclick="openEnvelope()">คลิกที่นี่</button>

    <div class="envelope-wrapper" id="envelope-wrapper">
        <div class="envelope" id="envelope">
            <div class="letter-content">    
    		 <p>Chúc mừng sinh nhật bạn!</p>
   		 <img src="Screenshot_2026-01-27-14-27-17-89_1c3...jpg" alt="Ảnh 1">
    		 <img src="IMG_20260221_152459_861.jpg" alt="Ảnh 2">
    		 <img src="IMG_20260221_152453_005.jpg" alt="Ảnh 3">
    		 <img src="IMG_20260308_222531_235.jpg" alt="Ảnh 4">
    		 <img src="IMG_20260319_231925_575.jpg" alt="Ảnh 5">
   		 <img src="lv_0_20260310132937.jpg" alt="Ảnh 6">
		</div>
        </div>
    </div>

    <script>
        function openEnvelope() {
            // Ẩn nút và hiện bì thư
            document.getElementById('start-btn').style.display = 'none';
            const wrapper = document.getElementById('envelope-wrapper');
            wrapper.style.display = 'block';
            
            // Tự động mở thư sau một chút
            setTimeout(() => {
                document.getElementById('envelope').classList.add('open');
                startEffects();
            }, 500);
        }

        function startEffects() {
            // Tạo trái tim liên tục
            setInterval(createHeart, 300);
            // Tạo con ong
            createBee();
            createBee();
        }

        function createHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            heart.innerHTML = '❤️';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px';
            heart.style.duration = (Math.random() * 3 + 2) + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        function createBee() {
            const bee = document.createElement('div');
            bee.classList.add('bee');
            bee.innerHTML = '🐝';
            bee.style.left = Math.random() * 80 + 'vw';
            bee.style.top = Math.random() * 80 + 'vh';
            // Mỗi con ong bay một kiểu khác nhau
            bee.style.animationDuration = (Math.random() * 5 + 5) + 's';
            document.body.appendChild(bee);
        }
    </script>
</body>
</html>
