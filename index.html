<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>I LOVE U - Final Version</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        canvas { position: absolute; top: 0; left: 0; }
        .content {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            text-align: center; z-index: 10; pointer-events: none;
        }
        .love-text { 
            color: #ffdf00; /* Màu vàng kim sang trọng */
            font-size: 5rem; 
            font-weight: bold; 
            text-shadow: 0 0 10px #ffdf00, 0 0 30px #ff4d6d, 0 0 50px #ff0000;
            animation: pulse 1.5s infinite;
            white-space: nowrap;
        }
        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.9; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.9; }
        }
        .bee { position: absolute; font-size: 25px; z-index: 5; }
        .flower { position: absolute; font-size: 22px; z-index: 4; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="content">
        <div class="love-text">I LOVE U 💞</div>
    </div>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let particles = [];

        function init() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        class Particle {
            constructor() { this.reset(); }
            reset() {
                this.t = Math.random() * Math.PI * 2;
                const point = getHeartPoint(this.t);
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.targetX = canvas.width / 2 + point.x * 15;
                this.targetY = canvas.height / 2 + point.y * 15;
                this.speed = Math.random() * 0.04 + 0.01;
                this.size = Math.random() * 2 + 1;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                if (Math.abs(this.x - this.targetX) < 1) this.reset();
            }
            draw() {
                ctx.fillStyle = "#ff3366";
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 1500; i++) particles.push(new Particle());

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }

        function createDecor(emoji, className, isFalling) {
            const el = document.createElement('div');
            el.innerHTML = emoji;
            el.className = className;
            el.style.left = Math.random() * 100 + 'vw';
            el.style.top = isFalling ? '-5vh' : Math.random() * 100 + 'vh';
            document.body.appendChild(el);

            let x = parseFloat(el.style.left);
            let y = parseFloat(el.style.top);
            let speedY = isFalling ? Math.random() * 0.8 + 0.3 : (Math.random() - 0.5) * 1.5;
            let speedX = (Math.random() - 0.5) * 1.2;

            function move() {
                y += speedY; x += speedX;
                if (y > 105) { y = -5; x = Math.random() * 100; }
                if (x < -5) x = 105; if (x > 105) x = -5;
                el.style.top = y + 'vh'; el.style.left = x + 'vw';
                requestAnimationFrame(move);
            }
            move();
        }

        init(); animate();
        for(let i=0; i<15; i++) createDecor('🐝', 'bee', false);
        for(let i=0; i<20; i++) createDecor('🌹', 'flower', true);
        window.addEventListener('resize', init);
    </script>
</body>
</html>
